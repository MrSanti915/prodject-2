<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftSecure — Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./stlye.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card reveal">
            <div class="brand">
                <div class="brand-mark">S</div>
                <span>SwiftSecure</span>
            </div>

            <header class="auth-header">
                <h1>Create your account</h1>
                <p>Get started with a secure, elegant workspace.</p>
            </header>

            <form class="auth-form" action="#" method="post">
                <label for="name">Name</label>
                <input id="name" type="text" name="Name" placeholder="Jordan Doe" required>

                <label for="email">Email</label>
                <input id="email" type="email" name="Email" placeholder="you@company.com" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="Password" placeholder="Create a password" required>

                <label for="confirm">Confirm password</label>
                <input id="confirm" type="password" name="ConfirmPassword" placeholder="Repeat your password" required>

                <button class="btn primary" type="submit">Create account</button>
            </form>

            <div class="auth-footer">
                <span>Already have an account?</span>
                <a class="auth-link" href="./login.html">Log in</a>
            </div>
        </section>
    </main>
</body>
</html>
