<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftSecure — Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./stlye.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card auth-card--compact reveal">
            <div class="brand">
                <div class="brand-mark">S</div>
                <span>SwiftSecure</span>
            </div>

            <header class="auth-header">
                <h1>Reset your password</h1>
                <p>We will email you a secure reset link.</p>
            </header>

            <form class="auth-form" action="#" method="post">
                <label for="email">Email</label>
                <input id="email" type="email" name="Email" placeholder="you@company.com" required>

                <button class="btn primary" type="submit">Send reset link</button>
            </form>

            <div class="auth-footer">
                <span>Remembered your password?</span>
                <a class="auth-link" href="./login.html">Back to login</a>
            </div>
        </section>
    </main>
    
</body>
</html>
